name: Build and Test with TypeScript
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      - name: Install dependencies
        run: npm install
      - name: Build with TypeScript
        run: npm run build
      - name: Test with Jest
        run: npm run test
      - name: Always succeed
        run: echo 'Success!'